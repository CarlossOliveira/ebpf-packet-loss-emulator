name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  document:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Doxygen
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz pip

      - name: Install Python dependencies
        run: |
          pip install properdocs mkdocs-gen-files mkdocs-material 

      - name: Generate Doxygen API
        run: doxygen Doxyfile

      - name: Build MkDocs site
        working-directory: docs/website
        run: npm run build

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v1
