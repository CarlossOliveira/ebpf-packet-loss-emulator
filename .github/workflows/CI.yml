name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install project dependencies
        run: make install

      - name: Install tooling
        run: | 
          sudo apt-get update
          sudo apt-get install -y build-essential clang-tools bear

      - name: Build project and generate compilation database
        run: bear --output compile_commands.json -- make clean all

      - name: Copy compilation database to build directory
        run: mv compile_commands.json build/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ebpf-packet-loss-emulator
          path: |
            build/
          retention-days: 1

  static-analysis-clang-tidy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Install project dependencies
        run: make install

      - name: Install tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-tidy clang-tools

      - name: Open compilation database
        uses: actions/download-artifact@v4
        with:
          name: ebpf-packet-loss-emulator
          path: build/

      - name: Run clang-tidy
        run: |
          find src -name "*.c" ! -name "*.bpf.c" -print0 | \
          xargs -0 clang-tidy -p build/ \
            --extra-arg=-std=gnu17 \
            -header-filter=src/ \
            -checks=clang-analyzer-core.*,clang-analyzer-unix.*,bugprone-narrowing-conversions

  static-analysis-cppcheck:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Install project dependencies
        run: make install

      - name: Install tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck

      - name: Open compilation database
        uses: actions/download-artifact@v4
        with:
          name: ebpf-packet-loss-emulator
          path: build/

      - name: Run cppcheck
        run: |
          cppcheck \
            --project=build/compile_commands.json \
            --enable=warning,style,performance,portability \
            --error-exitcode=1 \
            --suppress=unknownMacro \
            --suppress=missingIncludeSystem \
            --suppress=unusedFunction \
            --enable=all \
            --std=c11 \
            --verbose

  code-format-clang-format:
    runs-on: ubuntu-latest
    needs:
      - static-analysis-clang-tidy
      - static-analysis-cppcheck

    steps:
      - uses: actions/checkout@v4

      - name: Install tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format

      - name: Check formatting
        run: |
          find src \
            -type f \( -name "*.c" -o -name "*.h" \) \
            ! -name "vmlinux.h" \
            -exec clang-format --dry-run --Werror {} \;
