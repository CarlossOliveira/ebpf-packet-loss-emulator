name: CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install project dependencies
        run: make install

      - name: Install tooling
        run: | 
          sudo apt-get update
          sudo apt-get install -y build-essential clang-tools bear

      - name: Build project and generate compilation database
        run: bear --output compile_commands.json -- make clean all

      - name: Copy compilation database to build directory
        run: mv compile_commands.json build/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ebpf-packet-loss-emulator
          path: |
            build/
          retention-days: 1


  static-analysis-clang-tidy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Install project dependencies
        run: make install

      - name: Install tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-tidy clang-tools

      - name: Open compilation database
        uses: actions/download-artifact@v4
        with:
          name: ebpf-packet-loss-emulator
          path: build/

      - name: Run clang-tidy
        run: |
          find src -name "*.c" ! -name "*.bpf.c" -print0 | \
          xargs -0 clang-tidy -p build/ \
            --extra-arg=-std=gnu17 \
            -header-filter=src/ \
            -checks=clang-analyzer-core.*,clang-analyzer-unix.*,bugprone-narrowing-conversions


  static-analysis-cppcheck:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Install project dependencies
        run: make install

      - name: Install tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck

      - name: Open compilation database
        uses: actions/download-artifact@v4
        with:
          name: ebpf-packet-loss-emulator
          path: build/

      - name: Run cppcheck
        run: |
          cppcheck \
            --project=build/compile_commands.json \
            --std=c17 \
            --enable=all \
            --error-exitcode=1 \
            --suppress=unknownMacro \
            --suppress=missingIncludeSystem \
            --suppress=syntaxError:src/user-space/core/setup.c \
            --suppress=syntaxError:src/user-space/core/bpf_manager.c \
            --suppress=syntaxError:src/user-space/core/configuration.c \
            --suppress=unusedFunction


  code-format-clang-format:
    runs-on: ubuntu-latest
    needs:
      - static-analysis-clang-tidy
      - static-analysis-cppcheck

    steps:
      - uses: actions/checkout@v4

      - name: Install tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format

      - name: Check formatting
        run: |
          clang-format --dry-run --Werror \
          $(find src -type f \( -name "*.c" -o -name "*.h" \) ! -name "vmlinux.h")


  test:
    runs-on: ubuntu-latest
    needs:
      - static-analysis-clang-tidy
      - static-analysis-cppcheck

    steps:
      - uses: actions/checkout@v4

      - name: Install project dependencies
        run: make install

      - name: Install tooling
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Open compilation database
        uses: actions/download-artifact@v4
        with:
          name: ebpf-packet-loss-emulator
          path: build/
      
      - name: Give execute permissions to the binary
        run: sudo chmod +x build/bin/ebpf-packet-loss-emulator

      - name: Test module loading
        run: |
          sudo ./build/bin/ebpf-packet-loss-emulator \
          --run "list; load --module tc_bernoulli --interface eth0 --attachment-point ingress; exec sleep 15; unload; load -m xdp_bernoulli -i eth0 -a generic; sleep 15; exit;" \
          --dump ./logs/dump.txt

      - name: Confirm module loading
        run: |
          if ! grep -q "Module 'tc_bernoulli' attached successfully" ./logs/dump.txt; then
            echo "error: tc_bernoulli module failed to load"
            exit 1
          fi
          if ! grep -q "Module 'xdp_bernoulli' attached successfully" ./logs/dump.txt; then
            echo "error: xdp_bernoulli module failed to load"
            exit 1
          fi

      - name: See test results
        run: cat ./logs/dump.txt
