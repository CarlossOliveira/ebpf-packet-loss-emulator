name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  format:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format

      - name: Check formatting
        run: |
          find src \
            -type f \( -name "*.c" -o -name "*.h" \) \
            ! -name "vmlinux.h" \
            -exec clang-format --dry-run --Werror {} \;

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Project dependencies
        run: sudo chmod +x ./scripts/dependencie_manager.sh && ./scripts/dependencie_manager.sh install

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-tidy clang-tools bear

      - name: Generate compilation database
        run: bear -- make clean all

      - name: Run clang-tidy
        run: |
          find src -name "*.c" ! -name "*.bpf.c" | \
            xargs clang-tidy -p .

  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Project dependencies
        run: sudo chmod +x ./scripts/dependencie_manager.sh && ./scripts/dependencie_manager.sh install

      - name: Debug libbpf
        run: |
          find /usr/local -name libbpf.pc
          pkg-config --variable pc_path pkg-config
          PKG_CONFIG_PATH=/usr/local/lib/pkgconfig:/usr/local/lib64/pkgconfig pkg-config --modversion libbpf

      - name: Compile project
        run: make all
