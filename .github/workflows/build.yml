name: Catch Compile Errors

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo chmod +x ./dependencie_manager.sh && ./dependencie_manager.sh install

      - name: Compile project
        run: make all
